<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f0"/>
      <stop offset="100%" stop-color="#f4e4d6"/>
    </linearGradient>
    <radialGradient id="tomatoBody" cx="0.38" cy="0.36" r="0.78">
      <stop offset="0%" stop-color="#ff6b5e"/>
      <stop offset="55%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#b02a3a"/>
    </radialGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cb85c"/>
      <stop offset="100%" stop-color="#2f7d32"/>
    </linearGradient>
    <linearGradient id="leafGradDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#256428"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="14" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle decorative dots -->
  <g fill="#e63946" opacity="0.06">
    <circle cx="120" cy="160" r="8"/>
    <circle cx="180" cy="900" r="6"/>
    <circle cx="900" cy="180" r="10"/>
    <circle cx="860" cy="860" r="7"/>
    <circle cx="80" cy="500" r="5"/>
    <circle cx="950" cy="540" r="6"/>
  </g>

  <!-- Tomato group, centered upper area -->
  <g transform="translate(0 -60)" filter="url(#softShadow)">
    <ellipse cx="512" cy="430" rx="260" ry="245" fill="url(#tomatoBody)"/>
    <path d="M 512 196 Q 502 350 512 670" stroke="#c92439" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35"/>
    <ellipse cx="420" cy="320" rx="82" ry="55" fill="#ffffff" opacity="0.28"/>
    <ellipse cx="406" cy="306" rx="38" ry="24" fill="#ffffff" opacity="0.38"/>

    <g transform="translate(512 196)">
      <path d="M 0 0 Q -100 -60 -140 -20 Q -107 20 -40 13 Z" fill="url(#leafGradDark)"/>
      <path d="M 0 0 Q 100 -60 140 -20 Q 107 20 40 13 Z" fill="url(#leafGradDark)"/>
      <path d="M 0 0 Q -73 -93 -107 -53 Q -60 -13 -7 -3 Z" fill="url(#leafGrad)"/>
      <path d="M 0 0 Q 73 -93 107 -53 Q 60 -13 7 -3 Z" fill="url(#leafGrad)"/>
      <path d="M 0 3 Q -30 -107 0 -133 Q 30 -107 0 3 Z" fill="url(#leafGrad)"/>
      <rect x="-8" y="-20" width="16" height="33" rx="6" fill="#3d2817"/>
    </g>

    <circle cx="512" cy="223" r="9" fill="#fff8e1" opacity="0.85"/>
    <circle cx="512" cy="223" r="4" fill="#c92439"/>
  </g>

  <!-- Title -->
  <text x="512" y="780" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="108" font-weight="800" fill="#2c2c2c"
        letter-spacing="-2">Pomodoro Timer</text>

  <!-- Tagline -->
  <text x="512" y="850" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="42" font-weight="400" fill="#7a4a4a"
        letter-spacing="6">FOCUS · BREAK · REPEAT</text>

  <!-- Bottom accent line -->
  <line x1="382" y1="900" x2="642" y2="900" stroke="#e63946" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
