<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container" id="app">
      <div class="mode-label" id="mode-label">Work</div>
      <div class="timer-display" id="timer-display">25:00</div>
      <div class="session-info" id="session-info">Session 1 / 4</div>
      <div class="controls">
        <button id="btn-start" class="btn btn-primary">Start</button>
        <button id="btn-pause" class="btn btn-secondary" disabled>Pause</button>
        <button id="btn-reset" class="btn btn-secondary">Reset</button>
      </div>
      <div class="skip-container">
        <button id="btn-skip" class="btn btn-skip">Phase überspringen</button>
      </div>
    </main>
  </body>
</html>
